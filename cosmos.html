<!DOCTYPE html>
<html lang="fr">
<head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="./auth.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920,initial-scale=1,user-scalable=no">
<script>
// Scale universel : adapte le contenu 1920x1080 a TOUTE resolution TV.
// On se base sur le VIEWPORT DE LAYOUT (clientWidth/Height fixé par le meta
// width=1920), PAS sur screen.width : sur les TV à densité ×2 (ex Freebox POP,
// screen.width=960) screen.width réduisait #app de moitié → bande noire à droite.
(function(){
  var de=document.documentElement;
  var sw=de.clientWidth||window.innerWidth||screen.width||1920;
  var sh=de.clientHeight||window.innerHeight||screen.height||1080;
  var scale=Math.min(sw/1920, sh/1080);
  if(scale<0.99||scale>1.01){
    var s=document.createElement('style');
    var sc=scale.toFixed(4);
    s.textContent=
      '#app,#bg{transform:scale('+sc+');transform-origin:top left}'+
      // Corriger la taille du body pour eviter le scroll
      'html,body{width:'+Math.round(sw)+'px;height:'+Math.round(sh)+'px;overflow:hidden}';
    document.head.appendChild(s);
  }
  // Stocker pour usage JS
  window.TV_SCALE=scale;
  window.TV_W=sw;
  window.TV_H=sh;
})();
</script>
<title>Cosmos TV</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
*{-webkit-tap-highlight-color:transparent}
*:focus,*:focus-visible{outline:none!important}
[hidden]{display:none!important}

:root{
  --bg:#080808;--accent:#4f8ef7;--accent2:#8ab4f8;
  --text:#fff;--dim:rgba(255,255,255,.52);
  --nh:68px;--safe:48px;--nav-top:20px;
  --cw:268px;--ch:151px;--cr:8px; /* cards paysage 16:9 (live + apps) */
  --pw:172px;--ph:258px; /* cards affiche portrait 2:3 (films + séries) */
  --hc:66,133,244;
}

html,body{
  width:1920px;height:1080px;background:#0f0f0f;color:var(--text);
  font-family:'Google Sans','Roboto',system-ui,sans-serif;
  font-size:16px;overflow:hidden;user-select:none;-webkit-user-select:none;
}

/* ─── BACKGROUND ─────────────────────────────────────────────────────── */
#bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 50% 45% at 72% 32%,rgba(var(--hc),.13) 0%,transparent 70%),
    radial-gradient(ellipse 80% 60% at 8% 90%,rgba(120,60,220,.08) 0%,transparent 60%),
    #040410;
  transition:background 1.8s ease;
}
.blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0}
/* Blobs statiques (animations supprimees pour fluidite) */
.b1{width:900px;height:700px;left:-200px;top:-200px;
    background:radial-gradient(ellipse,rgba(66,133,244,.10) 0%,transparent 65%);}
.b2{width:700px;height:600px;right:-150px;bottom:-150px;
    background:radial-gradient(ellipse,rgba(140,80,240,.08) 0%,transparent 65%);}

/* ─── APP SHELL ──────────────────────────────────────────────────────── */
#app{position:relative;width:1920px;height:1080px;overflow:hidden;z-index:1}

/* Scrim haut : garde la nav lisible sur les backdrops clairs */
#nav-scrim{
  position:absolute;top:0;left:0;right:0;height:160px;z-index:15;
  pointer-events:none;
  background:linear-gradient(to bottom,rgba(0,0,0,.55) 0%,rgba(0,0,0,.2) 45%,transparent 100%);
}
/* Avatar profil (decoratif, comme Google TV) */
.nav-avatar{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,#5b8def,#8a5bef);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:700;color:#fff;
  border:1px solid rgba(255,255,255,.25);margin-left:4px;
}
/* ─── NAV — Google TV exact ──────────────────────────────────────────── */
#topnav{
  position:absolute;top:var(--nav-top);left:0;right:0;
  height:var(--nh);z-index:20;pointer-events:none;
  display:flex;align-items:center;padding:0 var(--safe);
}

/* Gauche: logo + search (comme Google TV) */
#nav-left{display:flex;align-items:center;gap:6px;pointer-events:auto;flex-shrink:0}
.nav-logo{
  height:50px;display:flex;align-items:center;cursor:pointer;padding:0 2px;
}
.nav-logo svg{height:50px;width:auto;display:block}
#nav-search-outer{
  width:40px;height:40px;border-radius:50%;
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:rgba(255,255,255,.7);font-size:20px;
}
#nav-search-outer.foc{background:rgba(255,255,255,.15);color:#fff}

/* Centre: pill de tabs — identique Google TV */
#nav-items{
  flex:1;display:flex;justify-content:center;align-items:center;pointer-events:auto;
}
#nav-pill{
  display:flex;align-items:center;gap:0;
  background:rgba(30,30,30,.9);
  border-radius:50px;padding:5px 6px;
  border:1px solid rgba(255,255,255,.08);
}
.ni{
  display:inline-flex;align-items:center;
  padding:8px 26px;border-radius:40px;
  font-size:16px;font-weight:500;color:rgba(255,255,255,.55);
  cursor:pointer;white-space:nowrap;
  transition:background .12s,color .12s;
}
.ni.active{background:rgba(255,255,255,.20);color:#fff;font-weight:700}
.ni.foc{background:rgba(255,255,255,.32)!important;color:#fff!important;font-weight:700;box-shadow:0 0 0 2px rgba(255,255,255,.5)}

/* Droite: icones seules (Google TV: camera + bell) */
#nav-right{display:flex;align-items:center;gap:8px;pointer-events:auto;flex-shrink:0}
.nav-icon{
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.68);cursor:pointer;font-size:18px;
}
.nav-icon.foc{background:rgba(255,255,255,.18);color:#fff}
#nav-voice{color:var(--accent2)}
#nav-voice.foc{background:rgba(79,142,247,.3);color:#fff}
#nav-settings.foc{background:rgba(255,255,255,.15);color:#fff}

/* ─── VIEWS ──────────────────────────────────────────────────────────── */
#main{position:absolute;inset:0;overflow:hidden}
/* Toutes les vues cachees par defaut */
.view{
  display:none;flex-direction:column;
  width:100%;height:100%;
  padding-top:calc(var(--nav-top) + var(--nh));
}
/* Seule la vue active est visible */
.view.view-active{display:flex!important}

/* ─── HERO — Google TV style ─────────────────────────────────────────── */
#hero{
  height:540px;flex-shrink:0;
  position:relative;overflow:hidden;
}
/* Backdrop image (plein ecran, sombre) — double couche pour crossfade fluide */
.hero-bd{
  position:absolute;inset:0;z-index:0;
  background-size:cover;background-position:center 20%;
  opacity:0;
  transition:opacity .7s ease;
}
.hero-bd.show{opacity:0.55}
/* Gradients de lecture */
#hero-bg-grad{
  position:absolute;inset:0;z-index:1;
  background:
    linear-gradient(to right,rgba(4,4,16,.95) 22%,rgba(4,4,16,.5) 48%,rgba(4,4,16,.1) 70%,transparent 100%),
    linear-gradient(to top,rgba(4,4,16,.95) 0%,rgba(4,4,16,.3) 25%,transparent 55%),
    linear-gradient(to bottom,rgba(4,4,16,.4) 0%,transparent 20%);
}
/* Poster portrait droit */
#hero-poster{
  position:absolute;right:120px;top:24px;z-index:2;
  width:260px;height:390px;border-radius:14px;object-fit:cover;display:none;
  box-shadow:0 8px 60px rgba(0,0,0,.9),0 0 0 1px rgba(255,255,255,.08),
             0 0 80px rgba(var(--hc),.35);
  transition:box-shadow 1.5s ease;
}
#hero-poster.vis{display:block}
#hero-info{
  position:absolute;bottom:36px;left:var(--safe);z-index:3;
  max-width:820px;
}
#hero-badges{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.hbadge{
  display:inline-flex;align-items:center;
  padding:4px 10px;border-radius:5px;
  font-size:11px;font-weight:800;letter-spacing:.5px;
}
.hb-i{background:rgba(255,196,90,.95);color:#1a1000}
.hb-q{background:rgba(79,142,247,.9);color:#fff}
.hb-y{background:rgba(255,255,255,.15);color:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.22)}
#hero-title{
  font-size:68px;font-weight:900;line-height:1.0;
  letter-spacing:-2px;margin-bottom:10px;
  text-shadow:0 2px 30px rgba(0,0,0,.9),0 0 80px rgba(0,0,0,.5);
  max-width:820px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
#hero-meta{font-size:13px;color:rgba(255,255,255,.6);margin-bottom:12px;letter-spacing:.5px;text-transform:uppercase}
#hero-plot{
  font-size:14px;color:rgba(255,255,255,.75);line-height:1.7;
  max-width:680px;margin-bottom:22px;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
#hero-acts{display:flex;gap:12px}
.btn-hero{
  display:inline-flex;align-items:center;gap:8px;
  padding:12px 28px;border-radius:999px;
  font-size:14px;font-weight:700;border:none;cursor:pointer;
  transition:box-shadow .1s;
}
.btn-play{background:#fff;color:#0a0e1e}
.btn-info{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.25)}
.btn-fav {background:rgba(255,255,255,.09);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.18)}
.btn-hero.foc{box-shadow:0 0 0 3px #fff,0 0 20px rgba(79,142,247,.6);transform:scale(1.05)}
#hero-dots{
  position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
  display:flex;gap:6px;z-index:3;
}
.h-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.3);transition:all .2s}
.h-dot.active{width:20px;border-radius:3px;background:rgba(255,255,255,.88)}

/* ─── CONTENT ROWS ───────────────────────────────────────────────────── */
#content{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;padding-bottom:24px}
#content::-webkit-scrollbar{display:none}
.row{margin-bottom:10px}
/* Rows style Google TV — titre blanc simple */
.row{margin-bottom:16px}
.row-title{
  font-size:16px;font-weight:500;letter-spacing:0;
  color:rgba(255,255,255,.9);
  padding:0 var(--safe);margin-bottom:12px;
}
.row-title-accent{display:none} /* supprime l'accent bar, comme Google TV */
.row-items{display:flex;gap:12px;padding:4px var(--safe) 8px;overflow-x:auto;scrollbar-width:none}
.row-items::-webkit-scrollbar{display:none}
/* Entree echelonnee des rangees (opacity seule = ne perturbe pas le scroll focus) */
@keyframes rowIn{from{opacity:0}to{opacity:1}}
.row{animation:rowIn .45s both}
/* Fondu du texte hero a chaque changement */
@keyframes heroInfoIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
#hero-info.swap{animation:heroInfoIn .55s ease both}
/* Fondu de la vue active (onglets Search/Settings) */
@keyframes viewIn{from{opacity:0}to{opacity:1}}
.view.view-active{animation:viewIn .3s ease both}

/* ─── CARDS ──────────────────────────────────────────────────────────── */
/* Cards paysage 16:9 style Google TV */
.card{
  flex-shrink:0;width:var(--cw);border-radius:var(--cr);
  overflow:hidden;cursor:pointer;position:relative;
  background:#1c1c1c;border:1px solid rgba(255,255,255,.06);
  transition:transform .2s cubic-bezier(.2,.7,.3,1),box-shadow .2s cubic-bezier(.2,.7,.3,1);
  will-change:transform;
}
.card.foc{
  transform:translateY(-6px) scale(1.07);
  box-shadow:0 0 0 3px #fff,0 16px 42px rgba(0,0,0,.85);
  z-index:5;border-color:#fff;
}
.card-iw{position:relative}
.card img{
  width:100%;height:var(--ch);object-fit:cover;display:block;
  opacity:0;transition:opacity .45s ease;
}
.card img.loaded{opacity:1}
/* Cartes affiche portrait (films + séries) : la tuile épouse la jaquette 2:3 */
.card.poster{width:var(--pw)}
.card.poster img{height:var(--ph);object-fit:cover}
.card.live img{height:var(--ch);object-fit:contain;padding:14px;background:#111}
/* Tuiles d'applications (etagere Google TV) */
.app-card img{height:var(--ch);object-fit:cover;background:#1c1c1c}
.app-card.app-icon img{object-fit:contain;padding:26px;background:radial-gradient(ellipse at center,#262630,#16161c)}
.app-card .cinfo{padding:8px 10px 10px}
.app-card .ctitle{font-weight:500}
.cprog{position:absolute;bottom:0;left:0;right:0;height:3px;background:rgba(0,0,0,.6)}
.cprog-fill{height:100%;background:var(--accent)}
.cbadge{
  position:absolute;top:6px;left:6px;
  font-size:9px;font-weight:800;padding:2px 7px;border-radius:4px;
  pointer-events:none;background:rgba(0,0,0,.82);
}
.cbf{color:#8ab4f8}.cbs{color:#81c995}.cbl{background:#e53935;color:#fff}
/* Info sous image — minimaliste Google TV */
.cinfo{padding:8px 10px 10px;background:#1c1c1c}
.ctitle{font-size:13px;font-weight:500;color:rgba(255,255,255,.90);overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.ccat{font-size:11px;color:rgba(255,255,255,.42);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card.foc .ctitle{color:#fff;font-weight:600}
.card.foc .ccat{color:var(--accent2)}

/* ─── GRID VIEW ──────────────────────────────────────────────────────── */
#grid-header{flex-shrink:0;padding:16px var(--safe) 10px}
#grid-title{font-size:13px;font-weight:700;color:var(--dim);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
#filter-bar{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding:2px 0 4px}
#filter-bar::-webkit-scrollbar{display:none}
.fpill{
  flex-shrink:0;padding:5px 16px;border-radius:999px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.55);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;
}
.fpill.active{background:linear-gradient(135deg,var(--accent),#5b3fd4);color:#fff;border-color:transparent;font-weight:700}
.fpill.foc{box-shadow:0 0 0 2px #fff}
.fpill-sep{flex-shrink:0;width:1px;height:20px;background:rgba(255,255,255,.14);align-self:center;margin:0 2px}
#grid-wrap{
  flex:1;overflow-y:auto;scrollbar-width:none;
  padding:6px var(--safe) 24px;
  display:flex;flex-wrap:wrap;gap:12px;align-content:flex-start;
}
#grid-wrap::-webkit-scrollbar{display:none}

/* ─── SEARCH VIEW — clavier à l'écran style Google TV ─────────────────── */
#search-view{overflow:hidden}
#search-bar{padding:16px var(--safe) 10px;flex-shrink:0}
#sinput{
  width:760px;max-width:60%;padding:14px 24px;border-radius:14px;
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);
  color:#fff;font-size:20px;font-weight:600;letter-spacing:.5px;outline:none;
  display:inline-flex;align-items:center;min-height:54px;vertical-align:middle;
}
#sinput.empty{color:rgba(255,255,255,.4);font-weight:400}
#sinput .caret{display:inline-block;width:2px;height:24px;background:var(--accent);margin-left:3px;animation:blink 1s step-end infinite;vertical-align:middle}
@keyframes blink{50%{opacity:0}}
#search-hint{font-size:13px;color:var(--dim);margin-top:8px;padding-left:6px}
#search-body{display:flex;gap:26px;flex:1;overflow:hidden;padding:6px var(--safe) 20px}
/* Clavier */
#search-kb{
  display:grid;grid-template-columns:repeat(6,52px);grid-auto-rows:48px;gap:8px;
  flex-shrink:0;align-content:start;
}
.kbk{
  display:flex;align-items:center;justify-content:center;
  border-radius:10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.10);
  color:rgba(255,255,255,.85);font-size:18px;font-weight:600;cursor:pointer;user-select:none;
  transition:transform .12s,background .12s;
}
.kbk.wide{grid-column:span 2}
.kbk.foc{background:#fff;color:#0a0e1e;transform:scale(1.12);box-shadow:0 0 0 2px var(--accent),0 8px 20px rgba(0,0,0,.6);z-index:2}
.kbk.act{background:rgba(79,142,247,.25);color:#fff;border-color:var(--accent)}
/* Résultats */
#search-results{
  flex:1;overflow-y:auto;scrollbar-width:none;align-content:flex-start;
  display:flex;flex-wrap:wrap;gap:12px;
}
#search-results::-webkit-scrollbar{display:none}
#search-empty{color:var(--dim);font-size:15px;padding:30px 4px;align-self:flex-start}

/* ─── SETTINGS ───────────────────────────────────────────────────────── */
#settings-view{overflow:hidden}
.set-title{font-size:24px;font-weight:800;margin-bottom:24px;padding:20px var(--safe) 0}
.set-list{padding:0 var(--safe);overflow-y:auto;flex:1}
.set-item{
  padding:15px 22px;margin-bottom:10px;min-width:460px;
  border-radius:14px;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);font-size:14px;cursor:pointer;
}
.set-item.foc{background:rgba(79,142,247,.2);border-color:var(--accent)}
.set-desc{font-size:11px;color:var(--dim);margin-top:4px}

/* ─── PANEL ──────────────────────────────────────────────────────────── */
#panel{
  position:absolute;inset:0;z-index:50;
  background:#05060e;
  display:flex;flex-direction:column;
  padding:72px 80px 56px;
  overflow:hidden;
}
/* Backdrop cinématique plein écran (affiche floutée + dégradés de lecture) */
#panel-backdrop{
  position:absolute;inset:0;z-index:0;
  background-size:cover;background-position:center 20%;
  opacity:.5;filter:blur(2px);transform:scale(1.06);
}
#panel-scrim{
  position:absolute;inset:0;z-index:1;pointer-events:none;
  background:
    linear-gradient(to right,rgba(5,6,14,.97) 30%,rgba(5,6,14,.6) 60%,rgba(5,6,14,.3) 100%),
    linear-gradient(to top,rgba(5,6,14,.98) 0%,rgba(5,6,14,.3) 40%,transparent 70%);
}
#panel > *:not(#panel-backdrop):not(#panel-scrim){position:relative;z-index:2}
.panel-close-btn{
  position:absolute;top:32px;right:48px;z-index:3;
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.12);border:none;color:#fff;
  font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.panel-close-btn.foc{background:#fff;color:#111;box-shadow:0 0 0 3px rgba(255,255,255,.5)}
.panel-header{display:flex;gap:44px;margin-bottom:26px;flex-shrink:0;align-items:flex-start}
.panel-poster{
  width:268px;height:402px;border-radius:16px;object-fit:cover;flex-shrink:0;background:#111;
  box-shadow:0 20px 70px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.08),0 0 90px rgba(var(--hc),.3);
}
.panel-info{flex:1;min-width:0;padding-top:8px;max-width:980px}
.panel-kicker{font-size:13px;font-weight:800;letter-spacing:2px;color:var(--accent2);text-transform:uppercase;margin-bottom:12px}
.panel-title{font-size:52px;font-weight:900;line-height:1.02;letter-spacing:-1.5px;margin-bottom:14px;text-shadow:0 2px 30px rgba(0,0,0,.8)}
.panel-meta{font-size:16px;color:rgba(255,255,255,.7);margin-bottom:20px;letter-spacing:.3px}
.panel-plot{
  font-size:19px;color:rgba(255,255,255,.86);line-height:1.65;max-width:840px;
  display:-webkit-box;-webkit-line-clamp:6;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:28px;
}
.panel-acts{display:flex;gap:14px}
.panel-act-btn{
  display:flex;align-items:center;gap:9px;
  padding:14px 38px;border-radius:999px;font-size:16px;font-weight:700;border:none;cursor:pointer;
}
.panel-act-play{background:#fff;color:#0a0e1e}
.panel-act-fav{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2)}
.panel-act-btn.foc{box-shadow:0 0 0 2.5px var(--accent)}
.panel-act-btn.is-fav{background:var(--accent);color:#fff;border-color:transparent}
.panel-tabs{display:flex;gap:6px;margin-bottom:12px;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.panel-tab{
  flex-shrink:0;padding:6px 18px;border-radius:999px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.6);font-size:12px;cursor:pointer;white-space:nowrap;
}
.panel-tab.active{background:var(--accent);color:#fff;border-color:transparent}
.panel-tab.foc{box-shadow:0 0 0 2px #fff}
#panel-eps{flex:1;overflow-y:auto;scrollbar-width:none}
#panel-eps::-webkit-scrollbar{display:none}
.pep{
  display:flex;align-items:center;gap:14px;
  padding:10px 12px;border-radius:8px;margin-bottom:4px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);cursor:pointer;
}
.pep.foc{background:rgba(79,142,247,.18);border-color:rgba(79,142,247,.5)}
.pep.done{opacity:.5}
.pep-thumb{width:82px;height:48px;border-radius:4px;object-fit:cover;background:#111;flex-shrink:0}
.pep-code{font-size:10px;font-weight:700;color:var(--accent2);letter-spacing:.5px}

// ══════ NETTOYAGE / DEDUP CHAÎNES LIVE ═══════════════════════════════════
const LIVE_REGION=/^\s*(?:\|?\s*(?:FR|BE|CH|CA|QC|EU|UK|US|REU|CAR|CARIB|METRO|METROPOLE|DOM|TOM|VIP|TNT)\b\s*[:\-|]\s*)+/i;
const LIVE_QUAL=/[\s_\-]+(4k|uhd|fhd|hevc|h\.?265|h265|hd|sd|vip|raw|backup|fps\d+|\d+fps|\d+p)\b/gi;
function liveBase(title){
  let s=String(title||'');
  s=s.replace(LIVE_REGION,'');               // prefixe pays/region (REU - , CAR - , FR | ...)
  s=s.replace(/[¹²³⁰-⁹]/g,''); // exposants ¹²³
  s=s.replace(LIVE_QUAL,' ');                // qualite n'importe ou
  s=s.replace(/\s*\([^)]*\)\s*$/,'');        // (...) final
  s=s.replace(/[\s_\-]+\d+\s*$/,'');         // numero de doublon final
  s=s.replace(/\s+/g,' ').trim();
  return s||String(title||'').trim();
}
function liveKey(title){ return liveBase(title).toLowerCase().replace(/[^a-z0-9]/g,''); }
const CATPRIO={'France':10,'Cinéma':15,'Sport':20,'Séries':25,'Info':30,'Enfants':35,'Découverte':40,'Musique':45,'Général':50,'Belgique':60,'Suisse':62,'Canada':64,'Monde':70,'Autres':90};
function cleanLiveCat(cat){
  let c=String(cat||'').replace(/\b(eu|fr|be|ch|ca|qc|uk|us|vip|hd|fhd|uhd|4k|sd|hevc)\b/gi,' ')
    .replace(/[|_\-]+/g,' ').replace(/\s+/g,' ').trim().toLowerCase();
  const h=k=>c.includes(k);
  if(!c) return 'Général';
  if(h('sport')) return 'Sport';
  if(h('cinema')||h('cinéma')||h('film')||h('movie')) return 'Cinéma';
  if(h('serie')||h('série')) return 'Séries';
  if(h('enfant')||h('kids')||h('jeunesse')||h('dessin')||h('cartoon')) return 'Enfants';
  if(h('doc')||h('decouv')||h('découv')||h('nature')||h('histoire')||h('science')) return 'Découverte';
  if(h('music')||h('musique')||h('clip')||h('radio')) return 'Musique';
  if(h('info')||h('news')||h('actu')) return 'Info';
  if(h('belg')) return 'Belgique';
  if(h('suisse')) return 'Suisse';
  if(h('canad')||h('quebec')||h('québec')) return 'Canada';
  if(h('afriq')||h('arab')||h('maghreb')||h('turk')||h('portug')||h('espag')||h('ital')||h('monde')||h('world')) return 'Monde';
  if(h('france')||h('national')||h('general')||h('général')||h('tnt')||h('dom')||h('tom')||h('metro')) return 'France';
  return c.replace(/\b\p{L}/gu,m=>m.toUpperCase());
}

// ══════ TITLE/QUALITY ═══════════════════════════════════════════════════
function cleanTitle(t){
  if(!t)return'';let s=String(t);
  s=s.replace(/^(FR|SRS|EN|VOD|SERIE)\s*[-|:]\s*/i,'');
  s=s.replace(/\s*(?:group-title|tvg-\w+)\s*=\s*"[^"]*"/gi,'');
  s=s.replace(/\.(mkv|mp4|ts|m3u8|avi|mov)$/i,'');
  s=s.replace(/\s*\(\d{4}\)\s*$/,'');
  return s.replace(/\s+/g,' ').trim();
}
function inferQuality(src){
  const t=String(src||'').toLowerCase();
  if(/\b(4k|uhd|2160p?)\b/.test(t))return'4K';
  if(/\b(fhd|full[\s-]?hd|1080p?)\b/.test(t))return'FHD';
  if(/\b(hd|720p?)\b/.test(t))return'HD';
  return'';
}

// ══════ NETWORK ══════════════════════════════════════════════════════════
// Fetch ASYNCHRONE — Java stocke le resultat, JS poll getAsyncResult() toutes les 150ms
window._onFetchReady=function(){}; // conserve pour compatibilite Java
function bridgeFetchAsync(url){
  return new Promise(resolve=>{
    if(window.AndroidBridge?.fetchJsonAsync&&window.AndroidBridge?.getAsyncResult){
      const id='f'+Date.now().toString(36)+Math.random().toString(36).slice(2);
      try{
        AndroidBridge.fetchJsonAsync(url,id);
        let n=0;
        const poll=setInterval(()=>{
          n++;
          try{
            const raw=AndroidBridge.getAsyncResult(id);
            if(raw!==null&&raw!==undefined&&raw!==''){
              clearInterval(poll);
              let p=null;try{p=JSON.parse(raw);}catch(e){}
              resolve(p);return;
            }
          }catch(e){}
          if(n>60){clearInterval(poll);resolve(null);} // 9s timeout
        },150);
        return;
      }catch(e){}
    }
    // Fallback fetch() navigateur
    fetch(url).then(r=>r.ok?r.json():null).catch(()=>null).then(resolve);
  });
}
// Legacy sync fallback (conserve pour episodes API)
async function bridgeFetch(url){
  if(window.AndroidBridge?.fetchJson){
    try{const r=AndroidBridge.fetchJson(url);if(r)return JSON.parse(r);}catch{}
  }
  try{const r=await fetch(url);return r.ok?r.json():null;}catch{return null;}
}

// ══════ NORMALISE ════════════════════════════════════════════════════════
function extractArr(j){
  if(!j)return[];if(Array.isArray(j))return j;
  for(const k of['items','streams','channels','movies','series','vod']){if(Array.isArray(j[k]))return j[k];}
  return[];
}
function normalise(raw,isSerie){
  if(!raw)return null;
  const title=raw.title||raw.name||'';
  if(!title||/\bvostfr\b/i.test(title))return null;
  return{
    title:cleanTitle(title),
    image:raw.stream_icon||raw.image||raw.cover||raw.poster||'',
    category:cleanTitle(raw.category_name||raw.category||'Autre'),
    plot:raw.plot||raw.description||raw.overview||'',
    url:raw.stream_url||raw.url||'',
    series_id:isSerie?(raw.series_id||raw.id||null):null,
    stream_id:raw.stream_id||null,
    quality:inferQuality([title,raw.category_name||''].join(' ')),
    added:raw.added||0,
    isLive:false,
  };
}

// ══════ LIVE TV GROUPING ════════════════════════════════════════════════
const QUAL_SUFFIX = /[\s|_\-]+(4K|UHD|FHD|HEVC|H\.?265|HD|SD)\s*$/i;
const QUAL_BADGE  = {
  '4K':'qb-4k','UHD':'qb-4k','FHD':'qb-fhd','HEVC':'qb-hevc',
  'H265':'qb-hevc','H.265':'qb-hevc','HD':'qb-hd','SD':'qb-sd'
};
function qualLabel(title){
  const m=title.match(QUAL_SUFFIX);
  return m?m[1].toUpperCase():'STD';
}
function qualBadge(q){ return QUAL_BADGE[q]||'qb-std'; }
function groupLiveItems(items){
  // Dédup global par nom normalisé : une chaîne n'apparaît qu'UNE fois,
  // ses différentes qualités deviennent des variantes. Catégorie nettoyée.
  const groups={}, order=[];
  items.forEach(item=>{
    const key=liveKey(item.title);
    if(!key)return;
    if(!groups[key]){
      groups[key]={title:liveBase(item.title),image:item.image,category:cleanLiveCat(item.category),isLive:true,variants:[]};
      order.push(key);
    }
    const g=groups[key];
    const q=qualLabel(item.title);
    if(!g.variants.some(v=>v.qualLabel===q))g.variants.push({...item,title:g.title,qualLabel:q});
    if(item.image&&!g.image)g.image=item.image;
  });
  return order.map(key=>{
    const g=groups[key];
    if(g.variants.length===1){const v={...g.variants[0]};v.category=g.category;v.image=g.image;return v;}
    return{title:g.title,image:g.image||'',category:g.category,isLive:true,isGroup:true,variants:g.variants};
  });
}

// ══════ TMDB ENRICHMENT ══════════════════════════════════════════════════
async function tmdbEnrich(title){
  const clean=title.replace(/\s*[-–|:]\s*\d{4}\s*$/,'').replace(/\s*\(\d{4}\)/,'').trim();
  if(_tmdbCache[clean])return _tmdbCache[clean];
  try{
    // Non-bloquant: utilise fetch() du navigateur (setAllowUniversalAccessFromFileURLs=true)
    const q=encodeURIComponent(clean);
    const r=await fetch(`https://api.themoviedb.org/3/search/multi?query=${q}&api_key=${TMDB_KEY}&language=fr-FR&include_adult=false`);
    if(!r.ok){_tmdbCache[clean]=null;return null;}
    const d=await r.json();
    const item=d.results?.find(x=>x.backdrop_path)||d.results?.[0];
    if(!item){_tmdbCache[clean]=null;return null;}
    const res={
      backdrop:item.backdrop_path?`${TMDB_IMG}w1280${item.backdrop_path}`:null,
      poster:item.poster_path?`${TMDB_IMG}w500${item.poster_path}`:null,
      rating:item.vote_average?(item.vote_average/2).toFixed(1):null,
      overview:item.overview||null,
      year:(item.release_date||item.first_air_date||'').slice(0,4),
      genres:(item.genre_ids||[]),
    };
    _tmdbCache[clean]=res;
    return res;
  }catch(e){_tmdbCache[clean]=null;return null;}
}

// ══════ AMBIENT COLOR ═══════════════════════════════════════════════════
function extractColor(imgEl,cb){
  try{
    const c=document.createElement('canvas');c.width=20;c.height=30;
    const ctx=c.getContext('2d');ctx.drawImage(imgEl,0,0,20,30);
    const d=ctx.getImageData(3,3,14,24).data;
    let r=0,g=0,b=0,n=0;
    for(let i=0;i<d.length;i+=4){r+=d[i];g+=d[i+1];b+=d[i+2];n++;}
    if(n>0)cb(~~(r/n),~~(g/n),~~(b/n));else cb(66,133,244);
  }catch(e){cb(66,133,244);}
}

}

const CACHE_KEY='pf_content_v2';

function getCached(){

function saveCache(vod,series,live){

// ══════ CONTENT LOADING ══════════════════════════════════════════════════
// Fetch + normalisation des 3 sources → {allVod,allSeries,liveRaw}
async function fetchContentData(){
  const vodJson    = await bridgeFetch(GH+'vod.json');
  const seriesJson = await bridgeFetch(GH+'series.json');
  const liveJson   = await bridgeFetch(GH+'live.json');
  if(!vodJson&&!seriesJson&&!liveJson)return null;
  const seen=new Set(),allVod=[],allSeries=[];
  function addItem(raw,isSerie){
    const item=normalise(raw,isSerie);if(!item)return;
    const key=item.title+'|'+(item.series_id||item.stream_id||'');
    if(seen.has(key))return;seen.add(key);
    if(isSerie)allSeries.push(item);else allVod.push(item);
  }
  extractArr(vodJson).forEach(r=>addItem(r,false));
  extractArr(seriesJson).forEach(r=>addItem(r,true));
  const liveRaw=extractArr(liveJson).map((ch,i)=>({
    title:cleanTitle(ch.title||ch.name||'Sans titre'),
    image:ch.stream_icon||ch.image||'',
    category:cleanTitle(ch.category_name||ch.category||'Live TV'),
    plot:'',isLive:true,
    url:ch.stream_url||ch.url||`http://goldenlink.live/live/${U}/${P}/${ch.stream_id||i}.ts`,
    stream_id:ch.stream_id||String(i),
  }));
  return{allVod,allSeries,liveRaw};
}

async function loadContent(){
  $('loading').hidden=false;
  try{
    // 1) Essayer le cache d abord (instantane)
    const cache=getCached();
    if(cache){
      buildContent(cache.vod,cache.series,cache.live);
      $('loading').hidden=true;
      // MAJ silencieuse du contenu en arriere-plan
      setTimeout(refreshContentSilently,2500);
      return;
    }
    // 2) Premier lancement ou cache expire : fetch reseau
    const d=await fetchContentData();
    if(d){
      saveCache(d.allVod,d.allSeries,d.liveRaw);
      buildContent(d.allVod,d.allSeries,d.liveRaw);
    }
  }finally{$('loading').hidden=true;}
}

// Rafraichit le contenu sans spinner ni perturber la navigation.
// Ne re-rend l'accueil que si l'utilisateur est au repos sur le hero.
let _refreshing=false;
async function refreshContentSilently(){
  if(_refreshing)return;_refreshing=true;
  try{
    const d=await fetchContentData();
    if(!d||(!d.allVod.length&&!d.allSeries.length))return;
    saveCache(d.allVod,d.allSeries,d.liveRaw);
    const changed = d.allVod.length!==S.allVod.length || d.allSeries.length!==S.allSeries.length;
    if(changed && S.sec==='home' && S.zone==='hero'){
      buildContent(d.allVod,d.allSeries,d.liveRaw); // utilisateur au repos → rafraichit visuellement
    }else{
      // MAJ silencieuse des donnees, visible au prochain changement d'onglet
      S.allVod=d.allVod;S.allSeries=d.allSeries;S.allItems=[...d.allVod,...d.allSeries];
      S.liveItems=groupLiveItems(d.liveRaw.filter(isClean));
      const cleanItems=S.allItems.filter(i=>isClean(i)&&i.image);
      S.heroPool=shuffle(cleanItems).slice(0,80);
    }
  }finally{_refreshing=false;}
}

// Rafraichir au retour de veille / refocus (contenu a jour)
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden){
    const c=getCached();
    if(!c) loadContent(); else setTimeout(refreshContentSilently,800);
  }
});

function buildContent(allVod,allSeries,liveRaw){
  S.allVod=allVod;S.allSeries=allSeries;S.allItems=[...allVod,...allSeries];
  S.liveItems=groupLiveItems(liveRaw.filter(isClean));
  const cleanItems=S.allItems.filter(i=>isClean(i)&&i.image);
  S.heroPool=shuffle(cleanItems).slice(0,80);

  // byCat pour les rangees
  const byCat={};
  S.allItems.forEach(item=>{const c=item.category||'Autre';(byCat[c]=byCat[c]||[]).push(item);});

  // Tendances: items les plus recents (tri par date ajout)
  const trending=[...S.allVod].filter(i=>isClean(i)&&i.image)
    .sort((a,b)=>Number(b.added||0)-Number(a.added||0)).slice(0,25);

  // Nouveautes Series
  const newSeries=[...S.allSeries].filter(i=>isClean(i)&&i.image)
    .sort((a,b)=>Number(b.added||0)-Number(a.added||0)).slice(0,20);

  const rows=[];
  const histItems=getHist().slice(0,15).map(h=>h.item).filter(i=>i&&!i.isLive&&isClean(i));
  if(histItems.length)rows.push({title:'▶ Continuer a regarder',items:histItems});
  const favItems=getFavs().slice(0,30).map(f=>f.item).filter(i=>i&&isClean(i));
  if(favItems.length)rows.push({title:'♥ Mes favoris',items:favItems});
  if(trending.length)rows.push({title:'Nouveautes Films',items:trending});
  if(newSeries.length)rows.push({title:'Nouveautes Series',items:newSeries});
  if(S.heroPool.length)rows.push({title:'Recommande pour vous',items:S.heroPool.slice(0,30)});
  Object.entries(byCat)
    .filter(([cat])=>!ADULT_RE.test(cat)&&!LATEST_RE.test(cat))
    .sort((a,b)=>b[1].length-a[1].length)
    .filter(([,v])=>v.length>=3).slice(0,16)
    .forEach(([cat,items])=>rows.push({title:cat,items:items.filter(isClean).slice(0,20)}));
  if(S.liveItems.length)rows.push({title:'TV en Direct',items:S.liveItems.slice(0,30),isLive:true});
  S.rows=rows;
  // Utiliser renderTabHome qui gere tout (hero + rows)
  clearInterval(S.heroTimer);
  renderTabHome();
  S.heroTimer=setInterval(()=>{
    if(S.zone!=='hero'&&S.zone!=='row')return;
    if(S.sec==='home'&&S.heroPool.length)setHero(S.heroPool[Math.floor(Math.random()*Math.min(S.heroPool.length,30))]);
  },30000);
}

// Crossfade backdrop entre deux couches — fluidite type Google TV

    const capturedItem=item;
    tmdbEnrich(item.title).then(tmdb=>{
      if(!tmdb||S.heroItem!==capturedItem)return; // item a change
      if(tmdb.backdrop){
        setBackdrop(tmdb.backdrop);
      }
      if(tmdb.poster){
        poster.src=tmdb.poster;poster.classList.add('vis');
      }
      if(tmdb.rating) score.textContent='★ '+tmdb.rating;
      if(tmdb.overview) $('hero-plot').textContent=tmdb.overview;
      if(tmdb.year&&!$('hb-cat').textContent.includes(tmdb.year)){
        cat.textContent=prettyCat(item)+' · '+tmdb.year;
      }
    }).catch(()=>{});
  }
}

// ══════ CARD ════════════════════════════════════════════════════════════
function mkCard(item,ri,ci,isLive){
  if(item.isApp){
    const el=document.createElement('div');
    el.className='card app-card'+(item.banner?'':' app-icon');
    el.dataset.ri=ri;el.dataset.ci=ci;
    const iw=document.createElement('div');iw.className='card-iw';
    const img=document.createElement('img');
    img.loading='lazy';
    img.onload=()=>img.classList.add('loaded');
    img.onerror=()=>{img.src=BLANK;img.onerror=null;img.classList.add('loaded');};
    img.src=item.image||BLANK;
    if(img.complete)img.classList.add('loaded');
    iw.appendChild(img);el.appendChild(iw);
    const info=document.createElement('div');info.className='cinfo';
    const title=document.createElement('div');title.className='ctitle';title.textContent=item.title||'';
    info.appendChild(title);el.appendChild(info);
    return el;
  }
  const live=isLive||item.isLive||false;
  const el=document.createElement('div');
  el.className='card'+(live?' live':'');
  el.dataset.ri=ri;el.dataset.ci=ci;
  const iw=document.createElement('div');iw.className='card-iw';
  // Films + séries → tuile au format affiche portrait (épouse la jaquette)
  if(!live)el.classList.add('poster');
  const img=document.createElement('img');
  img.loading='lazy';
  img.onload=()=>img.classList.add('loaded');
  img.onerror=()=>{img.src=BLANK;img.onerror=null;img.classList.add('loaded');};
  img.src=item.image||BLANK;
  if(img.complete)img.classList.add('loaded');
  iw.appendChild(img);
  // Progress bar
  if(!live&&item.stream_id){
    const pk='vid_'+item.stream_id;el.dataset.progKey=pk;
    const pct=getProg()[pk]?.pct||0;
    if(pct>2){
      const pb=document.createElement('div');pb.className='cprog';
      const pf=document.createElement('div');pf.className='cprog-fill';
      pf.style.width=Math.min(pct,100)+'%';
      pb.appendChild(pf);iw.appendChild(pb);
    }
  }
  // Badge
  const badge=document.createElement('div');
  badge.className='cbadge '+(live?'cbl':item.series_id?'cbs':'cbf');
  badge.textContent=item.isGroup?'LIVE ▾':live?'LIVE':item.series_id?'SÉRIE':'FILM';
  iw.appendChild(badge);
  el.appendChild(iw);
  const info=document.createElement('div');info.className='cinfo';
  const title=document.createElement('div');title.className='ctitle';title.textContent=item.title||'';
  const cat=document.createElement('div');cat.className='ccat';cat.textContent=prettyCat(item);
  info.appendChild(title);info.appendChild(cat);
  el.appendChild(info);
  return el;
}

// ══════ GRID ════════════════════════════════════════════════════════════
function openGrid(type){
  $('grid-title').textContent=type==='movies'?'Films':'Séries';
  S.gridAll=(type==='movies'?S.allVod:S.allSeries).filter(isClean);
  S.gridFilter='';S.gridQuality='';S.gridFavOnly=false;S.gridSort='recent';
  buildFilters();applyGrid();
  S.zone='filter';S.filterIdx=0;S.gridIdx=0;focus();
}
function buildFilters(){
  const cats=[...new Set(S.gridAll.map(i=>i.category).filter(Boolean))].sort();
  const quals=[...new Set(S.gridAll.map(i=>i.quality).filter(Boolean))].sort();
  const pills=[
    {label:'Tout',val:'',type:'cat'},
    ...cats.map(c=>({label:c,val:c,type:'cat'})),
    {sep:true},
    {label:'Toute qualite',val:'',type:'qual'},
    ...quals.map(q=>({label:q,val:q,type:'qual'})),
    {sep:true},
    {label:'Favoris',val:'fav',type:'fav'},
    {sep:true},
    {label:'Titre A-Z',val:'title',type:'sort'},
    {label:'Recents',val:'recent',type:'sort'},
  ];
  S.filterPills=pills;
  const bar=$('filter-bar');bar.innerHTML='';
  pills.forEach((p,i)=>{
    if(p.sep){const s=document.createElement('div');s.className='fpill-sep';bar.appendChild(s);return;}
    const el=document.createElement('div');el.className='fpill';el.dataset.pi=i;el.textContent=p.label;
    const isActive=(p.type==='cat'&&p.val===S.gridFilter)||(p.type==='qual'&&p.val===S.gridQuality)||
                   (p.type==='fav'&&p.val==='fav'&&S.gridFavOnly)||(p.type==='sort'&&p.val===S.gridSort&&p.val!=='title'&&S.gridSort!=='title')||(p.type==='sort'&&p.val==='title'&&S.gridSort==='title'&&i===pills.findIndex(x=>x.type==='sort'));
    if(isActive)el.classList.add('active');
    bar.appendChild(el);
  });
}
function applyGrid(){
  let items=S.gridAll;
  if(S.gridFilter)items=items.filter(i=>i.category===S.gridFilter);
  if(S.gridQuality)items=items.filter(i=>i.quality===S.gridQuality);
  if(S.gridFavOnly){const favKeys=new Set(getFavs().map(f=>f.k));items=items.filter(i=>favKeys.has(itemKey(i)));}
  if(S.gridSort==='recent')items=[...items].sort((a,b)=>Number(b.added)-Number(a.added));
  else items=[...items].sort((a,b)=>(a.title||'').localeCompare(b.title||''));
  S.gridItems=items;renderGrid();
}
function renderGrid(){
  const wrap=$('grid-wrap');wrap.innerHTML='';
  S.gridItems.forEach((item,i)=>{
    const c=mkCard(item,-1,i,false);c.dataset.gi=i;wrap.appendChild(c);
  });
}
function activateFilterPill(idx){
  const nonSep=S.filterPills.filter(p=>!p.sep);
  const pill=S.filterPills[idx];if(!pill||pill.sep)return;
  if(pill.type==='cat'){S.gridFilter=pill.val;}
  else if(pill.type==='qual'){S.gridQuality=pill.val;}
  else if(pill.type==='fav'){S.gridFavOnly=!S.gridFavOnly;}
  else if(pill.type==='sort'){S.gridSort=pill.val;}
  buildFilters();applyGrid();S.gridIdx=0;
}

async function loadSeries(sid){
  const mapUrl=GH+'episodes_map.json';
  const map=await bridgeFetch(mapUrl);
  if(map&&map[sid]){
    const partIdx=map[sid];
    const part=await bridgeFetch(GH+`episodes_part${partIdx}.json`);
    if(part&&part[sid]){buildPanel(part[sid]);return;}
  }
  // Fallback API
  const data=await bridgeFetch(`${API}?action=get_series_info&series_id=${sid}&username=${U}&password=${P}`);
  if(data)buildPanel(data);
}
function buildPanel(data){
  const info=data.info||data;
  const eps=data.episodes||{};
  S.panelSmap={};S.panelSmeta=[];
  Object.entries(eps).forEach(([sNum,epList])=>{
    S.panelSmap[sNum]=epList;
    S.panelSmeta.push({sNum,count:epList.length});
  });
  S.panelSmeta.sort((a,b)=>Number(a.sNum)-Number(b.sNum));
  const tabs=$('panel-tabs');tabs.innerHTML='';
  S.panelSmeta.forEach((s,i)=>{
    const t=document.createElement('div');
    t.className='panel-tab'+(i===0?' active':'');
    t.textContent='Saison '+s.sNum;
    t.dataset.ti=i;tabs.appendChild(t);
  });
  if(S.panelSmeta.length){
    S.panelSelSeason=S.panelSmeta[0].sNum;
    renderEps(S.panelSelSeason);
  }
}
function renderEps(sNum){
  const epList=S.panelSmap[sNum]||[];
  S.panelEps=epList;
  const prog=getProg();
  const eps=$('panel-eps');eps.innerHTML='';
  epList.forEach((ep,i)=>{
    const code='S'+pad2(ep.season||1)+'E'+pad2(ep.episode_num||i+1);
    const pk=`${S.panelItem.series_id}||${code}`;
    const pct=prog[pk]?.pct||0;
    const done=pct>90;
    const div=document.createElement('div');
    div.className='pep'+(done?' done':'');div.dataset.ei=i;
    div.innerHTML=`
      <img class="pep-thumb" src="${esc(ep.info?.movie_image||S.panelItem.image||BLANK)}" loading="lazy" onerror="this.src='${BLANK}'">
      <div style="flex:1;min-width:0">
        <div class="pep-code">${esc(code)}</div>
        <div class="pep-title">${esc(ep.title||ep.info?.name||('Episode '+(i+1)))}</div>
        ${pct>2?`<div class="pep-pct">${Math.round(pct)}% vu</div><div class="ep-prog"><div class="ep-prog-fill" style="width:${Math.min(pct,100)}%"></div></div>`:''}
      </div>
      <div class="pep-play">▶</div>`;
    eps.appendChild(div);
  });
}
function changePanelSeason(idx){
  if(idx<0||idx>=S.panelSmeta.length)return;
  S.panelTabIdx=idx;S.panelSelSeason=S.panelSmeta[idx].sNum;
  qAll('.panel-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  renderEps(S.panelSelSeason);S.panelEpIdx=0;
}
function playPanelEp(ei){
  const ep=S.panelEps[ei];if(!ep)return;
  S.resumeEpIdx=ei;
  const code='S'+pad2(ep.season||1)+'E'+pad2(ep.episode_num||ei+1);
  const pk=`${S.panelItem.series_id}||${code}`;
  const prog=getProg()[pk];
  if(prog&&prog.pct>10&&prog.pct<92){
    S.resumeStartMs=prog.t||0;S.resumeBtn=0;
    $('resume-sub').textContent=`${S.panelItem.title} · ${code} · ${Math.round(prog.pct)}% vu`;
    $('resume-modal').hidden=false;S.zone='resume';focus();return;
  }
  doPlayEp(ei,0);
}
function doPlayEp(ei,startMs){
  const ep=S.panelEps[ei];if(!ep)return;
  const url=(ep.stream_url||ep.url||'').replace(/^https?:\/\//i,'http://');
  const code='S'+pad2(ep.season||1)+'E'+pad2(ep.episode_num||ei+1);
  const title=`${S.panelItem.title} · ${code}`;
  S.lastProgKey=`${S.panelItem.series_id}||${code}`;
  S.lastProgItem=S.panelItem;
  playItem({url,title,isLive:false},startMs);
}

// ══════ PLAYBACK ════════════════════════════════════════════════════════
function playItem(item,startMs){
  const url=(item.url||'').replace(/^https?:\/\//i,'http://');
  if(window.AndroidBridge?.openInVlc){
    try{AndroidBridge.openInVlc(url,item.title||'',!!item.isLive);return;}catch{}
  }
  window.location.href=url;
}
window.onAndroidPlayerClosed=function(url,posMs,durMs){
  const key=S.lastProgKey;
  if(key&&durMs>5000){
    const pct=Math.round((posMs/durMs)*100);
    saveProg(key,{pct,t:posMs,d:durMs,ts:Date.now()});
    qAll(`.card[data-prog-key="${key}"]`).forEach(c=>{
      let pb=c.querySelector('.cprog');
      if(!pb&&pct>2){
        pb=document.createElement('div');pb.className='cprog';
        const pf=document.createElement('div');pf.className='cprog-fill';pb.appendChild(pf);
        c.querySelector('.card-iw')?.appendChild(pb);
      }
      if(pb)pb.querySelector('.cprog-fill').style.width=Math.min(pct,100)+'%';
    });
  }
  if(S.lastProgItem)pushHist(S.lastProgItem);
  S.lastProgKey=null;S.lastProgItem=null;
};

  }

  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SR){

      const recog=new SR();
      recog.lang='fr-FR';recog.interimResults=true;recog.maxAlternatives=1;

// ══════ SEARCH + CLAVIER À L'ÉCRAN ═══════════════════════════════════════
const KB_KEYS=(()=>{
  const a=[];
  'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(c=>a.push({t:c,a:'ins',v:c}));
  '0123456789'.split('').forEach(c=>a.push({t:c,a:'ins',v:c}));
  a.push({t:'espace',a:'space'},{t:'⌫',a:'del'},{t:'effacer',a:'clear'},{t:'🎙',a:'voice'});
  return a;
})();
const KB_COLS=6;
function buildKeyboard(){
  const kb=$('search-kb');if(!kb||kb.childElementCount)return;
  KB_KEYS.forEach((k,i)=>{
    const el=document.createElement('div');
    el.className='kbk'+((k.a==='space'||k.a==='clear')?' wide':'');
    el.dataset.ki=i;el.textContent=k.t;
    kb.appendChild(el);
  });
}
function renderQuery(){
  const el=$('sinput');
  if(!S.searchQuery){el.className='empty';el.textContent='Rechercher un film, une série…';}
  else{el.className='';el.innerHTML=esc(S.searchQuery)+'<span class="caret"></span>';}
}
function kbActivate(){
  const k=KB_KEYS[S.kbIdx];if(!k)return;
  if(k.a==='ins')S.searchQuery=(S.searchQuery||'')+k.v;
  else if(k.a==='space')S.searchQuery=(S.searchQuery||'')+' ';
  else if(k.a==='del')S.searchQuery=(S.searchQuery||'').slice(0,-1);
  else if(k.a==='clear')S.searchQuery='';
  else if(k.a==='voice'){openVoice();return;}
  renderQuery();doSearch(S.searchQuery);
}
function doSearch(q){
  S.searchQuery=q||'';
  renderQuery();
  const res=$('search-results');res.innerHTML='';
  const lo=(q||'').trim().toLowerCase();
  if(lo.length<1){
    S.gridItems=[];S.searchIdx=0;
    res.innerHTML='<div id="search-empty">Tapez pour rechercher dans les films, séries et chaînes…</div>';
    return;
  }
  const results=S.allItems.concat(S.liveItems).filter(i=>
    isClean(i)&&(
      (i.title||'').toLowerCase().includes(lo)||
      (i.category||'').toLowerCase().includes(lo)
    )
  ).slice(0,60);
  S.gridItems=results;S.searchIdx=0;S.gridIdx=0;
  if(!results.length){res.innerHTML='<div id="search-empty">Aucun résultat pour « '+esc(q)+' »</div>';return;}
  results.forEach((item,i)=>{const c=mkCard(item,-2,i,item.isLive);c.dataset.si=i;res.appendChild(c);});
}
function openSearchResults(q){
  showOnlyView('search-view');S.sec='search';buildKeyboard();
  doSearch(q);
  S.kbIdx=0;S.gridIdx=0;
  S.zone=S.gridItems.length?'search':'search-kb';
  focus();
}
function openItem(item){

  // Films + séries → fiche détail plein écran (jaquette + synopsis lisibles)

// Lecture effective d'un film (avec reprise) — appelée par le bouton Lecture de la fiche
function playMovie(item){
  S.lastProgKey=item.stream_id?'vid_'+item.stream_id:null;
  S.lastProgItem=item;

}

// Google TV n'a pas de grid-view — chaque tab = rows differentes dans HOME VIEW
function gotoSection(s){
  if(s==='voice'){openVoice();return;}
  if(s==='search'){showOnlyView('search-view');S.sec='search';buildKeyboard();S.searchQuery='';renderQuery();doSearch('');S.zone='search-kb';S.kbIdx=0;focus();return;}
  if(s==='settings'){showOnlyView('settings-view');S.sec='settings';renderSettings();S.zone='settings';S.setIdx=0;focus();return;}

  qAll('.ni').forEach(el=>el.classList.remove('active'));
  const target=document.querySelector(`.ni[data-s="${s}"]`);
  if(target)target.classList.add('active');
  const idx=['search','home','movies','shows','live','voice','settings'].indexOf(s);
  if(idx>=0)S.navIdx=idx;

  // TOUJOURS utiliser home-view — changer son contenu selon le tab (style Google TV)
  showOnlyView('home-view');
  S.sec=s;

  if(s==='home'){
    renderTabHome();
  }else if(s==='movies'){
    renderTabMovies();
  }else if(s==='shows'){
    renderTabShows();
  }else if(s==='live'){
    renderTabLive();
  }else if(s==='mylist'){
    renderTabMyList();
  }
}

  qAll('.view').forEach(v=>v.classList.remove('view-active'));
  const el=$(id);if(el)el.classList.add('view-active');
}

function renderTabHome(){

  if(hist.length)rows.push({title:'Reprendre la lecture',items:hist});
  const favs=getFavs().slice(0,20).map(f=>f.item).filter(i=>i&&isClean(i));

// ══════ APERÇU LIVE IN-TILE ══════════════════════════════════════════════
let _pvTimer=null,_pvKey=null;
function stopPreview(){
  clearTimeout(_pvTimer);
  if(_pvKey){ try{window.AndroidBridge?.stopLivePreview?.();}catch(e){} _pvKey=null; }
}
function managePreview(){
  if(!window.AndroidBridge?.startLivePreview){return;} // pas sur Android TV
  // Carte live actuellement focalisee ?
  let url=null,rectEl=null,key=null;
  if(S.zone==='row'){
    const row=S.rows[S.rowIdx];
    if(row&&row.isLive){
      const item=row.items[S.cardIdx];
      if(item){
        url=item.isGroup?(item.variants&&item.variants[0]&&item.variants[0].url):item.url;
        const cards=$('ri'+S.rowIdx)?.querySelectorAll('.card');
        if(cards&&cards[S.cardIdx])rectEl=cards[S.cardIdx].querySelector('.card-iw');
        key=S.rowIdx+'_'+S.cardIdx;
      }
    }
  }
  if(!url||!rectEl){stopPreview();return;}
  if(key===_pvKey)return;            // deja en apercu sur cette tuile
  clearTimeout(_pvTimer);
  try{window.AndroidBridge?.stopLivePreview?.();}catch(e){}
  _pvKey=null;
  _pvTimer=setTimeout(()=>{
    const r=rectEl.getBoundingClientRect();
    if(r.width<10)return;
    // Fractions (0..1) du viewport — Java multiplie par la taille reelle du WebView.
    // 100% independant de la densite/devicePixelRatio (fix du mauvais placement).
    const W=window.innerWidth||1920, H=window.innerHeight||1080;
    try{
      window.AndroidBridge.startLivePreview(url,
        r.left/W, r.top/H, r.width/W, r.height/H);
      _pvKey=key;
    }catch(e){}
  },850);
}

function focus(){
  // Clear all focus
  qAll('.ni,.nav-icon,.fpill,.card,.btn-hero,.panel-act-btn,.panel-tab,.pep,.resume-btn,.set-item,.kbk').forEach(el=>el.classList.remove('foc'));
  ['nav-voice','nav-settings','nav-search-outer'].forEach(id=>{const el=$(id);if(el)el.classList.remove('foc');});

  const z=S.zone;
  if(z==='nav'){
    // navIdx: 0=search(gauche), 1-4=tabs, 5=voice(droite), 6=settings(droite)
    if(S.navIdx===0)$('nav-search-outer').classList.add('foc');
    else{
      const navMain=qAll('#nav-pill .ni');
      const tabIdx=S.navIdx-1; // tabs 1-4 → indices 0-3
      if(tabIdx>=0&&tabIdx<=3&&navMain[tabIdx])navMain[tabIdx].classList.add('foc');
      else if(S.navIdx===5)$('nav-voice').classList.add('foc');
      else if(S.navIdx===6)$('nav-settings').classList.add('foc');
    }
  }
  else if(z==='hero'){
    const btns=qAll('#hero-acts .btn-hero');
    if(btns[S.hBtn])btns[S.hBtn].classList.add('foc');
  }
  else if(z==='row'){
    scrollToRow();
    const row=S.rows[S.rowIdx];if(!row)return;
    const items=$('ri'+S.rowIdx)?.querySelectorAll('.card');
    if(items&&items[S.cardIdx]){
      items[S.cardIdx].classList.add('foc');
      items[S.cardIdx].scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
    }
  }
  else if(z==='filter'){
    const pills=qAll('#filter-bar .fpill');
    const nonSepIdx=getPillElIdx(S.filterIdx);
    if(pills[nonSepIdx])pills[nonSepIdx].classList.add('foc');
  }
  else if(z==='grid'){
    const cards=qAll('#grid-wrap .card,#search-results .card');
    if(cards[S.gridIdx]){
      cards[S.gridIdx].classList.add('foc');
      cards[S.gridIdx].scrollIntoView({block:'nearest',behavior:'smooth'});
    }
  }
  else if(z==='panel-acts'){
    const btns=qAll('.panel-act-btn');
    if(btns[S.panelActIdx])btns[S.panelActIdx].classList.add('foc');
  }
  else if(z==='panel-tabs'){
    const tabs=qAll('.panel-tab');
    if(tabs[S.panelTabIdx])tabs[S.panelTabIdx].classList.add('foc');
  }
  else if(z==='panel-eps'){
    const eps=qAll('.pep');
    if(eps[S.panelEpIdx]){
      eps[S.panelEpIdx].classList.add('foc');
      eps[S.panelEpIdx].scrollIntoView({block:'nearest',behavior:'smooth'});
    }
  }
  else if(z==='resume'){
    const btns=qAll('.resume-btn');
    if(btns[S.resumeBtn])btns[S.resumeBtn].classList.add('foc');
  }
  else if(z==='settings'){
    const items=qAll('.set-item');
    if(items[S.setIdx])items[S.setIdx].classList.add('foc');
  }
  else if(z==='search'){
    const cards=qAll('#search-results .card');
    if(cards[S.gridIdx]){
      cards[S.gridIdx].classList.add('foc');
      cards[S.gridIdx].scrollIntoView({block:'nearest',behavior:'smooth'});
    }
  }
  else if(z==='search-kb'){
    qAll('.kbk').forEach(el=>el.classList.remove('foc'));
    const keys=qAll('.kbk');
    if(keys[S.kbIdx]){keys[S.kbIdx].classList.add('foc');keys[S.kbIdx].scrollIntoView({block:'nearest'});}
  }
  else if(z==='voice'){
    $('voice-cancel').classList.add('foc');
  }
  else if(z==='qual-picker'){
    qAll('.qp-item').forEach((el,i)=>el.classList.toggle('foc',i===S.qualIdx));
  }
  managePreview();
}

function getPillElIdx(pillDataIdx){
  // Map from S.filterPills index to actual pill element index (skipping seps)
  let elIdx=0;
  for(let i=0;i<pillDataIdx;i++){if(!S.filterPills[i]?.sep)elIdx++;}
  return elIdx;
}
function nextNonSepPill(from,dir){
  let i=from+dir;
  while(i>=0&&i<S.filterPills.length){
    if(!S.filterPills[i]?.sep)return i;
    i+=dir;
  }
  return from;
}

function scrollToRow(){
  const rowEl=$('content')?.querySelector(`.row[data-ri="${S.rowIdx}"]`);
  if(rowEl)rowEl.scrollIntoView({block:'nearest',behavior:'smooth'});
}

// ══════ D-PAD ════════════════════════════════════════════════════════════
function onKey(type){
  // Toast update intercept (prioritaire)
  if(_toastZone){
    if(type==='L'){qAll('.t-btn').forEach(b=>b.classList.remove('foc'));$('toast-btn-ok').classList.add('foc');}
    else if(type==='R'){qAll('.t-btn').forEach(b=>b.classList.remove('foc'));$('toast-btn-later').classList.add('foc');}
    else if(type==='E'){
      const okFoc=$('toast-btn-ok').classList.contains('foc');
      if(okFoc&&_updateUrl)window.AndroidBridge?.downloadAndInstall?.(_updateUrl);
      hideUpdateToast();
    }
    else if(type==='B'){hideUpdateToast();}
    return;
  }

  const z=S.zone;

  if(z==='qual-picker'){
    if(type==='U'){S.qualIdx=Math.max(0,S.qualIdx-1);focus();}
    else if(type==='D'){S.qualIdx=Math.min((S.qualItem?.variants?.length||1)-1,S.qualIdx+1);focus();}
    else if(type==='E'){
      const v=S.qualItem?.variants?.[S.qualIdx];
      closeQualPicker();
      if(v){S.lastProgItem=v;playItem(v,0);}
    }
    else if(type==='B'){closeQualPicker();}
    return;
  }

  if(z==='voice'){
    if(type==='B'||type==='back'){closeVoice();}
    else if(type==='E'){
      const r=$('voice-result').textContent.trim();
      if(r){closeVoice();openSearchResults(r);}
    }
    return;
  }

  if(z==='resume'){
    if(type==='L'){S.resumeBtn=0;focus();}
    else if(type==='R'){S.resumeBtn=1;focus();}
    else if(type==='E'){
      $('resume-modal').hidden=true;
      if(S.resumeEpIdx!==null){
        doPlayEp(S.resumeEpIdx,S.resumeBtn===0?S.resumeStartMs:0);
      }else if(S.lastProgItem){
        playItem(S.lastProgItem,S.resumeBtn===0?S.resumeStartMs:0);
        pushHist(S.lastProgItem);
      }
      S.zone=S.sec==='home'?'hero':'grid';focus();
    }
    else if(type==='B'){$('resume-modal').hidden=true;S.zone=S.sec==='home'?'hero':'grid';focus();}
    return;
  }

  if(z==='nav'){
    if(type==='L'){S.navIdx=Math.max(0,S.navIdx-1);focus();}
    else if(type==='R'){S.navIdx=Math.min(6,S.navIdx+1);focus();}
    else if(type==='D'||type==='E'){
      const s=NAV_SECS[S.navIdx];
      if(s==='voice'){openVoice();return;}
      if(s==='search'){gotoSection('search');return;}
      if(s==='settings'){gotoSection('settings');return;}
      if(s==='home'){S.zone='hero';S.hBtn=0;focus();}
      else{gotoSection(s);}
    }
    else if(type==='B'){S.zone='hero';focus();}
    return;
  }

  if(z==='hero'){
    if(type==='U'){S.zone='nav';focus();}
    else if(type==='D'){if(S.rows.length){S.zone='row';S.rowIdx=0;S.cardIdx=0;focus();}}
    else if(type==='L'){S.hBtn=Math.max(0,S.hBtn-1);focus();}
    else if(type==='R'){S.hBtn=Math.min(2,S.hBtn+1);focus();}
    else if(type==='E'){
      if(S.hBtn===0&&S.heroItem){
        const it=S.heroItem;
        if(it.isLive||it.isGroup)openItem(it);
        else if(it.series_id)openPanel(it);
        else playMovie(it);
      }
      else if(S.hBtn===1&&S.heroItem){openPanel(S.heroItem);}
      else if(S.hBtn===2&&S.heroItem){
        toggleFav(S.heroItem);
        document.querySelector('#hero-acts .btn-fav').textContent=isFav(S.heroItem)?'♥ Ma liste':'♡ Ma liste';
      }
    }
    return;
  }

  if(z==='row'){
    if(type==='U'){
      if(S.rowIdx===0){
        // 1 fois UP → hero, 2e fois UP depuis hero → nav (via hero zone)
        S.zone='hero';S.hBtn=0;focus();
      }
      else{S.rowIdx--;S.cardIdx=0;focus();}
    }
    else if(type==='D'){
      if(S.rowIdx<S.rows.length-1){S.rowIdx++;S.cardIdx=0;focus();}
    }
    else if(type==='L'){S.cardIdx=Math.max(0,S.cardIdx-1);focus();}
    else if(type==='R'){
      const row=S.rows[S.rowIdx];
      if(row)S.cardIdx=Math.min(row.items.length-1,S.cardIdx+1);
      focus();
    }
    else if(type==='E'){
      const row=S.rows[S.rowIdx];
      if(row&&row.items[S.cardIdx])openItem(row.items[S.cardIdx]);
    }
    else if(type==='B'){S.zone='hero';S.hBtn=0;focus();}
    return;
  }

  if(z==='filter'){
    if(type==='U'){S.zone='nav';focus();}
    else if(type==='D'){S.zone='grid';S.gridIdx=0;focus();}
    else if(type==='L'){S.filterIdx=nextNonSepPill(S.filterIdx,-1);focus();}
    else if(type==='R'){S.filterIdx=nextNonSepPill(S.filterIdx,1);focus();}
    else if(type==='E'){activateFilterPill(S.filterIdx);focus();}
    else if(type==='B'){gotoSection('home');}
    return;
  }

  // ── CLAVIER DE RECHERCHE ──
  if(z==='search-kb'){
    const col=S.kbIdx%KB_COLS, row=Math.floor(S.kbIdx/KB_COLS);
    if(type==='U'){ if(row===0)S.zone='nav'; else S.kbIdx-=KB_COLS; focus(); }
    else if(type==='D'){ if(S.kbIdx+KB_COLS<KB_KEYS.length)S.kbIdx+=KB_COLS; focus(); }
    else if(type==='L'){ if(col>0)S.kbIdx--; focus(); }
    else if(type==='R'){
      if(col<KB_COLS-1&&S.kbIdx+1<KB_KEYS.length){S.kbIdx++;focus();}
      else if(S.gridItems.length){S.zone='search';S.gridIdx=0;focus();} // bord droit → résultats
    }
    else if(type==='E'){kbActivate();focus();}
    else if(type==='B'){gotoSection('home');}
    return;
  }

  if(z==='grid'||z==='search'){
    const items=z==='search'?qAll('#search-results .card'):qAll('#grid-wrap .card');
    const cont=z==='search'?$('search-results'):$('grid-wrap');
    const availW=cont&&cont.clientWidth?cont.clientWidth:(1920-96);
    const cwReal=(items[0]?.offsetWidth||172)+12;
    const cols=Math.max(1,Math.floor(availW/cwReal));
    if(type==='U'){
      if(S.gridIdx<cols){S.zone=z==='grid'?'filter':'nav';focus();}
      else{S.gridIdx=Math.max(0,S.gridIdx-cols);focus();}
    }
    else if(type==='D'){S.gridIdx=Math.min(items.length-1,S.gridIdx+cols);focus();}
    else if(type==='L'){
      if(S.gridIdx%cols!==0){S.gridIdx--;focus();}
      else if(z==='search'){S.zone='search-kb';focus();} // bord gauche → clavier
    }
    else if(type==='R'){if(S.gridIdx%cols!==cols-1&&S.gridIdx<items.length-1){S.gridIdx++;focus();}}
    else if(type==='E'){
      if(S.gridItems[S.gridIdx])openItem(S.gridItems[S.gridIdx]);
    }
    else if(type==='B'){
      if(z==='search'){S.zone='search-kb';focus();}else{S.zone='filter';focus();}
    }
    return;
  }

  if(z==='panel-acts'){
    if(type==='L'){S.panelActIdx=Math.max(0,S.panelActIdx-1);focus();}
    else if(type==='R'){S.panelActIdx=Math.min(1,S.panelActIdx+1);focus();}
    else if(type==='D'){
      if($('panel-tabs').children.length>0){S.zone='panel-tabs';S.panelTabIdx=0;focus();}
      else if($('panel-eps').children.length>0){S.zone='panel-eps';S.panelEpIdx=0;focus();}
    }
    else if(type==='E'){
      if(S.panelActIdx===0){
        if(S.panelIsVod)playMovie(S.panelItem);
        else if(S.panelEps.length>0)playPanelEp(0);
      }else{
        const nowFav=toggleFav(S.panelItem);
        $('panel-btn-fav').textContent=nowFav?'♥ Favoris':'♡ Favoris';
        $('panel-btn-fav').classList.toggle('is-fav',nowFav);
      }
    }
    else if(type==='B'){closePanel();}
    return;
  }

  if(z==='panel-tabs'){
    if(type==='U'){S.zone='panel-acts';focus();}
    else if(type==='L'){S.panelTabIdx=Math.max(0,S.panelTabIdx-1);changePanelSeason(S.panelTabIdx);}
    else if(type==='R'){S.panelTabIdx=Math.min(S.panelSmeta.length-1,S.panelTabIdx+1);changePanelSeason(S.panelTabIdx);}
    else if(type==='D'){if($('panel-eps').children.length){S.zone='panel-eps';S.panelEpIdx=0;focus();}}
    else if(type==='E'){changePanelSeason(S.panelTabIdx);}
    else if(type==='B'){S.zone='panel-acts';focus();}
    return;
  }

  if(z==='panel-eps'){
    if(type==='U'){
      if(S.panelEpIdx===0){S.zone=S.panelSmeta.length?'panel-tabs':'panel-acts';focus();}
      else{S.panelEpIdx--;focus();}
    }
    else if(type==='D'){S.panelEpIdx=Math.min($('panel-eps').children.length-1,S.panelEpIdx+1);focus();}
    else if(type==='E'){playPanelEp(S.panelEpIdx);}
    else if(type==='B'){S.zone=S.panelSmeta.length?'panel-tabs':'panel-acts';focus();}
    return;
  }

  if(z==='settings'){
    if(type==='U'){if(S.setIdx>0){S.setIdx--;focus();}else{S.zone='nav';focus();}}
    else if(type==='D'){S.setIdx=Math.min(qAll('.set-item').length-1,S.setIdx+1);focus();}
    else if(type==='E'){activateSetting(S.setIdx);}
    else if(type==='B'){gotoSection('home');}
    return;
  }
}

// ══════ UPDATE SYSTEM ════════════════════════════════════════════════════
let _updateUrl='';
let _toastZone=false;

function showUpdateToast(tagName,downloadUrl){
  _updateUrl=downloadUrl;
  $('toast-title').textContent='Mise a jour '+tagName+' disponible !';
  $('toast-sub').textContent='Appuyez sur Installer pour telecharger et mettre a jour';
  $('update-toast').hidden=false;
  _toastZone=true;
  // Focus on OK button
  qAll('.t-btn').forEach(b=>b.classList.remove('foc'));
  $('toast-btn-ok').classList.add('foc');
}
function hideUpdateToast(){
  $('update-toast').hidden=true;
  _toastZone=false;
}

// Toast button clicks
$('toast-btn-ok').addEventListener('click',()=>{
  if(_updateUrl)window.AndroidBridge?.downloadAndInstall?.(_updateUrl);
  hideUpdateToast();
});
$('toast-btn-later').addEventListener('click',hideUpdateToast);

window._onUpdateResult=function(data){
  if(!data)return;
  // Mise a jour settings
  qAll('.set-item').forEach(el=>{
    if(el.dataset.action==='update'){
      const d=el.querySelector('.set-desc');
      if(data.upToDate)d.textContent='Application a jour (v'+data.currentVersion+')';
      else d.textContent='v'+data.tagName+' - telechargement en cours...';
    }
  });
  if(!data.upToDate&&data.downloadUrl){
    // AUTO: lance le telechargement + installation directement, sans demander
    _updateUrl=data.downloadUrl;
    $('toast-title').textContent='Mise a jour '+data.tagName+' — installation automatique';
    $('toast-sub').textContent='Telechargement en cours...';
    $('update-toast').hidden=false;
    if(window.AndroidBridge?.downloadAndInstall){
      try{AndroidBridge.downloadAndInstall(data.downloadUrl);}catch{}
    }
  }
};

window._onDownloadProgress=function(pct){
  $('toast-title').textContent='Telechargement... '+pct+'%';
  qAll('.set-item').forEach(el=>{
    if(el.dataset.action==='update'){
      const d=el.querySelector('.set-desc');
      if(d)d.textContent='Telechargement... '+pct+'%';
    }
  });
};

// Safety: cache le spinner apres 25s dans tous les cas
setTimeout(()=>{$('loading').hidden=true;},25000);

// Cosmos = interface TV uniquement. Hors TV (mobile/navigateur) → retour Xstream.
(async function(){
  var _isTV = /AndroidTV|GoogleTV|SmartTV/i.test(navigator.userAgent)
           || /\bTV\b/.test(navigator.userAgent)
           || window.PIPSILY_NATIVE === 'android_tv';
  if(!_isTV){ location.replace('./index.html'); return; }
  // Auth identique à VOD : même Supabase, même session partagée (origine commune)
  if(window.PIPSILY_AUTH&&window.PIPSILY_AUTH.authGate){
    try{ const a=await window.PIPSILY_AUTH.authGate(); if(!a) return; }catch(e){}
  }
  loadContent();
  loadApps();
})();

// ══════ APPLICATIONS (etagere style Google TV) ═══════════════════════════
function loadApps(){
  if(!window.AndroidBridge?.getInstalledApps)return;
  try{
    const raw=AndroidBridge.getInstalledApps();
    const arr=JSON.parse(raw||'[]');
    // Mettre en avant les apps populaires si presentes
    const PRIO=['netflix','youtube','primevideo','amazonvideo','disney','spotify','twitch','plex','kodi','molotov','canal','arte','mycanal','deezer','vlc'];
    const score=a=>{const p=(a.pkg||'').toLowerCase();const i=PRIO.findIndex(k=>p.includes(k));return i<0?99:i;};
    arr.sort((a,b)=>score(a)-score(b));
    S.appItems=arr.map(a=>({title:a.label,image:a.img,pkg:a.pkg,isApp:true,banner:a.banner,category:'Application'}));
    if(S.sec==='home'&&S.zone==='hero')renderTabHome(); // rafraichir si au repos
  }catch(e){}
}
